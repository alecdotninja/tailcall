name: CI

on:
  push:
    branches: 
      - main
  pull_request:
    branches:
      - main

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings

jobs:
  bench:
    name: ⏱️ Benchmark
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
      - name: Run benchmarks
        run: cargo bench --all

  build:
    name: 🔨 Build
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
      - name: Build (release)
        run: cargo build --all --release

  fmt:
    name: ✨ Format
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
      - name: Run Rustfmt
        run: cargo fmt --all -- --check

  lint:
    name: 🧹 Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
      - name: Run Clippy
        run: cargo clippy --all

  test:
    name: 🧪 Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
      - name: Run default tests
        run: cargo test --all
      - name: Run tailcall tests with at-least-inline-captures-32
        run: cargo test -p tailcall --features at-least-inline-captures-32
      - name: Run tailcall tests with at-least-inline-captures-48
        run: cargo test -p tailcall --features at-least-inline-captures-48

  test_miri:
    name: 🔬 Miri
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
      - name: Setup Miri
        run: |
          rustup toolchain install nightly \
            --profile minimal \
            --component miri \
            --component rust-src
          cargo +nightly miri setup
      - name: Run tests under Miri
        env:
          MIRIFLAGS: -Zmiri-strict-provenance -Zmiri-symbolic-alignment-check
        run: cargo +nightly miri test --all

  doc:
    name: 📚 Documentation
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
      - name: Build docs
        env:
          RUSTDOCFLAGS: -Dwarnings
        run: cargo doc --no-deps --all
